<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title data-i18n="optionsTitle">Container Tab Groups - Options</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1 data-i18n="optionsTitle">Container Tab Groups - Options</h1>
    
    <div class="section">
      <h2 data-i18n="generalSettings">General Settings</h2>
      
      <div class="option">
        <label>
          <input type="checkbox" id="enableAutoGrouping" checked>
          <span data-i18n="enableAutoGrouping">Enable automatic tab grouping</span>
        </label>
        <p class="description" data-i18n="enableAutoGroupingDesc">
          Automatically organize tabs into groups based on their containers
        </p>
      </div>
      
      <div class="option">
        <label>
          <input type="checkbox" id="groupNoContainer">
          <span data-i18n="groupNoContainer">Create group for "No Container" tabs</span>
        </label>
        <p class="description" data-i18n="groupNoContainerDesc">
          If enabled, tabs without a container will be grouped together. If disabled, they will remain ungrouped.
        </p>
      </div>
    </div>
    
    <div class="section">
      <h2 data-i18n="language">Language / Idioma</h2>
      
      <div class="option">
        <label for="languageSelect" data-i18n="selectLanguage">Select language:</label>
        <select id="languageSelect">
          <option value="en">English</option>
          <option value="es">Español</option>
        </select>
      </div>
    </div>
    
    <div class="button-container">
      <button id="saveButton" data-i18n="saveButton">Save Settings</button>
      <button id="resetButton" data-i18n="resetButton">Reset to Defaults</button>
    </div>
    
    <div id="status" class="status"></div>
  </div>
  
  <script src="i18n.js"></script>
  <script src="options.js"></script>
</body>
</html>
